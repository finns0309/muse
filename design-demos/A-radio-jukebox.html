<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>muse · radio · A jukebox</title>
<link rel="stylesheet" href="_tokens.css">
<style>
  .frame { width: 1020px; }
  .stage { padding: 0; }

  /* ===== HERO now-playing ===== */
  .hero {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 36px;
    padding: 44px 48px 36px;
    align-items: center;
  }
  .cover-xl {
    width: 280px; height: 280px; border-radius: 16px;
    background:
      radial-gradient(circle at 30% 25%, #f3d9a8, transparent 55%),
      linear-gradient(135deg, #e0c79b, #9c7e58 55%, #3a2a18);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.4) inset,
      0 0 0 1px rgba(40,30,20,0.10),
      0 30px 60px -24px rgba(40,30,20,0.55),
      0 10px 24px -12px rgba(40,30,20,0.35);
    position: relative;
  }
  .cover-xl::after {
    /* vinyl edge sheen */
    content: "";
    position: absolute; inset: 0; border-radius: 16px;
    background: linear-gradient(150deg, rgba(255,255,255,0.18), transparent 30%);
    pointer-events: none;
  }

  .meta { min-width: 0; }
  .kicker {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .kicker .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
    animation: breath 2s ease-in-out infinite;
  }
  @keyframes breath {
    0%,100% { box-shadow: 0 0 0 3px var(--accent-soft); }
    50%     { box-shadow: 0 0 0 6px color-mix(in srgb, var(--accent) 6%, transparent); }
  }

  .h-title {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 50px;
    line-height: 1.02;
    letter-spacing: -0.005em;
    color: var(--ink);
    margin: 0 0 8px;
  }
  .h-artist {
    font-size: 15px;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
    margin-bottom: 28px;
  }

  .progress-row {
    display: grid;
    grid-template-columns: 38px 1fr 38px;
    gap: 12px;
    align-items: center;
    margin-bottom: 24px;
  }
  .progress-row .t {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
  }
  .progress-row .t.r { text-align: right; }
  .bar {
    height: 3px;
    background: var(--hairline);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .bar > i {
    display: block; height: 100%; width: 36%;
    background: var(--accent);
    border-radius: 2px;
  }
  .bar > .knob {
    position: absolute;
    left: 36%;
    top: 50%;
    width: 11px; height: 11px;
    transform: translate(-50%, -50%);
    background: var(--paper-3);
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    box-shadow: 0 2px 6px -2px rgba(40,30,20,0.4);
  }

  .h-actions {
    display: flex; align-items: center; gap: 10px;
  }
  .btn-big {
    width: 52px; height: 52px;
    border: none;
    border-radius: 50%;
    background: var(--paper-3);
    color: var(--ink);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid var(--hairline-strong);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.7) inset,
      0 6px 14px -8px rgba(40,30,20,0.35);
    transition: transform 0.1s ease;
  }
  .btn-big:hover { transform: translateY(-1px); }
  .btn-big:active { transform: translateY(0); }
  .btn-big svg { width: 22px; height: 22px; }
  .btn-big.heart.liked {
    background: var(--accent);
    color: var(--paper-3);
    border-color: var(--accent);
  }
  .btn-big.skip {
    width: 64px; height: 64px;
  }
  .btn-big.skip svg { width: 26px; height: 26px; }
  .btn-big.skip {
    background: var(--ink);
    color: var(--paper-3);
    border-color: var(--ink);
  }
  .h-actions .queue {
    margin-left: 8px;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
    line-height: 1.3;
  }
  .h-actions .queue b {
    display: block;
    font-family: var(--serif);
    font-weight: 500;
    font-size: 22px;
    color: var(--ink);
    letter-spacing: 0;
  }

  /* ===== CHANNELS ===== */
  .channels-wrap {
    border-top: 1px solid var(--hairline);
    padding: 24px 48px 38px;
    background:
      linear-gradient(to bottom, var(--wash), transparent 40%),
      var(--paper-2);
  }
  .channels-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 16px;
  }
  .channels-head .label {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.2em;
    color: var(--ink-faint);
  }
  .channels-head .hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.12em;
  }
  .channels-head .hint kbd {
    font-family: var(--mono);
    font-size: 10px;
    padding: 1px 5px;
    border: 1px solid var(--hairline-strong);
    border-radius: 4px;
    background: var(--paper-3);
    color: var(--ink-soft);
  }

  .channels {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }
  .ch {
    position: relative;
    padding: 14px 12px 14px;
    background: var(--paper-3);
    border: 1px solid var(--hairline);
    border-radius: 12px;
    cursor: pointer;
    text-align: left;
    min-height: 96px;
    display: flex; flex-direction: column; justify-content: space-between;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset;
  }
  .ch:hover {
    transform: translateY(-1px);
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 8px 18px -10px rgba(40,30,20,0.35);
  }
  .ch .num {
    position: absolute;
    top: 8px; right: 10px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-ghost);
    letter-spacing: 0.06em;
  }
  .ch .stripe {
    position: absolute;
    left: 0; top: 12px; bottom: 12px;
    width: 3px;
    background: var(--mode-c, var(--ink-ghost));
    border-radius: 0 2px 2px 0;
    opacity: 0.55;
  }
  .ch .name {
    font-family: var(--serif);
    font-size: 21px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1;
    margin: 6px 0 4px;
  }
  .ch .now {
    font-size: 10.5px;
    color: var(--ink-faint);
    line-height: 1.35;
    letter-spacing: 0.01em;
    /* show what's currently loaded in this channel */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .ch.active {
    background: color-mix(in srgb, var(--mode-c) 10%, var(--paper-3));
    border-color: color-mix(in srgb, var(--mode-c) 35%, var(--hairline-strong));
    box-shadow:
      0 1px 0 rgba(255,255,255,0.5) inset,
      0 0 0 1px color-mix(in srgb, var(--mode-c) 22%, transparent),
      0 12px 24px -16px color-mix(in srgb, var(--mode-c) 55%, transparent);
  }
  .ch.active .stripe { opacity: 1; width: 4px; }
  .ch.active .num { color: var(--mode-c); }
  .ch.active .now { color: var(--ink-soft); }

  .ch[data-h="teal"]   { --mode-c: #5fb3a3; }
  .ch[data-h="gold"]   { --mode-c: #c6a15b; }
  .ch[data-h="rose"]   { --mode-c: #c87d8a; }
  .ch[data-h="clay"]   { --mode-c: #c8775a; }
  .ch[data-h="indigo"] { --mode-c: #6f7fa8; }
  .ch[data-h="sage"]   { --mode-c: #8fa872; }
  .ch[data-h="dusk"]   { --mode-c: #9d8cb5; }
</style>
</head>
<body>

<div class="frame">
  <div class="titlebar">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="title-tag">muse · radio · A jukebox</span>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="cover-xl"></div>
    <div class="meta">
      <div class="kicker"><span class="pulse"></span>NOW · CH 6 SIMILAR</div>
      <h1 class="h-title">MONTAGEM<br>SAKURA</h1>
      <div class="h-artist">SVNO</div>

      <div class="progress-row">
        <span class="t">1:42</span>
        <div class="bar"><i></i><span class="knob"></span></div>
        <span class="t r">2:48</span>
      </div>

      <div class="h-actions">
        <button class="btn-big heart liked" title="红心">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.6-9.6-9.3C.7 7.6 4 4 7.6 4c2 0 3.5 1 4.4 2.5C12.9 5 14.4 4 16.4 4 20 4 23.3 7.6 21.6 11.7 19.5 16.4 12 21 12 21z"/></svg>
        </button>
        <button class="btn-big skip" title="next">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4l11 8-11 8V4z"/><path d="M19 5v14"/></svg>
        </button>
        <div class="queue">
          QUEUE
          <b>1 · waiting</b>
        </div>
      </div>
    </div>
  </div>

  <!-- CHANNELS -->
  <div class="channels-wrap">
    <div class="channels-head">
      <span class="label">CHANNELS</span>
      <span class="hint">PRESS <kbd>1</kbd>–<kbd>7</kbd> · OR CLICK TO SWITCH</span>
    </div>

    <div class="channels">
      <button class="ch" data-h="teal">
        <span class="stripe"></span><span class="num">1</span>
        <span class="name">all</span>
        <span class="now">everything in your library, shuffled</span>
      </button>
      <button class="ch" data-h="gold">
        <span class="stripe"></span><span class="num">2</span>
        <span class="name">daily</span>
        <span class="now">18 picks for today · 1h 12m</span>
      </button>
      <button class="ch" data-h="rose">
        <span class="stripe"></span><span class="num">3</span>
        <span class="name">discover</span>
        <span class="now">42 fresh from NetEase</span>
      </button>
      <button class="ch" data-h="clay">
        <span class="stripe"></span><span class="num">4</span>
        <span class="name">dig up</span>
        <span class="now">last played 8mo+ ago</span>
      </button>
      <button class="ch" data-h="indigo">
        <span class="stripe"></span><span class="num">5</span>
        <span class="name">immersive</span>
        <span class="now">deep dive · pick an artist</span>
      </button>
      <button class="ch active" data-h="sage">
        <span class="stripe"></span><span class="num">6</span>
        <span class="name">similar</span>
        <span class="now">tuned to <em>SVNO</em> · 24 like this</span>
      </button>
      <button class="ch" data-h="dusk">
        <span class="stripe"></span><span class="num">7</span>
        <span class="name">single</span>
        <span class="now">loop this one</span>
      </button>
    </div>
  </div>
</div>

<script src="_picker.js"></script>
<script>mountPicker('#5fb3a3');</script>
</body>
</html>
